<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveNest - Akıllı Bulut Yönetimi</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0a0a0f;
            --text: #e8e8f0;
        }
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .hero {
            position: relative;
            z-index: 10;
            padding: 20px;
        }
        .logo {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            margin: 0 auto 20px;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.25rem;
            color: #8888a8;
            max-width: 600px;
            margin: 20px auto 40px;
        }
        .cta {
            background: var(--primary);
            color: white;
            padding: 16px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .cta:hover {
            background: var(--primary-dark);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
        }
        .links {
            margin-top: 60px;
            display: flex;
            gap: 24px;
            font-size: 0.9rem;
        }
        .links a {
            color: #555570;
            text-decoration: none;
            transition: color 0.2s;
        }
        .links a:hover {
            color: var(--primary);
        }
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0f 100%);
            z-index: 1;
        }
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.1);
            filter: blur(100px);
            border-radius: 50%;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="glow" style="top: 10%; right: 20%;"></div>
    <div class="glow" style="bottom: 10%; left: 20%;"></div>

    <div class="hero">
        <div class="logo">DN</div>
        <h1>DriveNest</h1>
        <p>Google Drive dosyalarınızı masaüstünden yönetmenin en şık ve hızlı yolu. Güvenli, açık kaynaklı ve tamamen yerel.</p>
        <a href="#" class="cta">Hemen İndir (v0.1.0)</a>
        
        <div class="links">
            <a href="privacy.html">Gizlilik Politikası</a>
            <a href="terms.html">Hizmet Şartları</a>
            <a href="https://github.com/emirft/drivenest">GitHub</a>
        </div>
    </div>
</body>
</html>
